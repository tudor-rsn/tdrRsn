<!DOCTYPE html>

<html>

<head>
    <meta charset="UTF-8">

    <title>tdrRsn</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <link rel="stylesheet" href="style.css">

</head>

<body>
    <h1>tdrRsn <span class="accent">//</span> <span class="version">v0.1</span></h1>

    <div class="boot-message">
        type '<span class="accent">help</span>' to view available commands
    </div>

    <div class="terminal-line">
        <span class="prompt">[visitor@tdrRsn: ~]$</span>
        <input
            type="text"
            class="command-input"
            name="command"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
            autofocus
        >
    </div>

    <div class="output"></div>

    <script src="script.js"></script>
</body>

</html>
